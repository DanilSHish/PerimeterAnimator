name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x86, x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-architecture: x64

    - name: Restore NuGet packages
      run: nuget restore PerimeterAnimator.sln

    - name: Build
      run: msbuild PerimeterAnimator.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PerimeterAnimator-${{ matrix.configuration }}-${{ matrix.platform }}
        path: |
          **/${{ matrix.configuration }}/*.exe
          **/${{ matrix.configuration }}/*.dll
